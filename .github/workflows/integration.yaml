name: Integration
on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review

permissions:
  contents: read

jobs:
  Integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install yq
      run: |
        wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod +x /usr/local/bin/yq

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        # Pinned: helm v4.2.1 regressed --wait, stalling chart installs for ~40
        # minutes (cert-manager, ingress-nginx) until they eventually succeed or
        # time out. v4.2.0 installs the same charts in seconds. Drop the pin once
        # a fixed helm release is available.
        version: v4.2.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate random suffix
      id: rand
      run: echo "suffix=$(openssl rand -hex 4)" >> "$GITHUB_OUTPUT"

    - name: Create KinD cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: identity-${{ github.run_id }}
        config: hack/ci/kind-config.yaml

    - name: Install cluster infrastructure
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
      run: make integration-infra

    - name: Install identity
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
        KIND_SUFFIX: ${{ steps.rand.outputs.suffix }}
      run: make integration-install

    - name: Create test fixtures
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
        KIND_SUFFIX: ${{ steps.rand.outputs.suffix }}
      run: make integration-fixtures

    - name: Run API integration tests
      id: api-tests
      run: make test-api-ci

    - name: Analyze API test failures with Claude
      if: always() && steps.api-tests.outcome == 'failure'
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      run: |
        if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
          {
            echo "## API Integration Test Failure Analysis"
            echo
            echo "Claude analysis skipped because CLAUDE_CODE_OAUTH_TOKEN is not configured."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        if [ ! -s junit.xml ]; then
          {
            echo "## API Integration Test Failure Analysis"
            echo
            echo "Claude analysis skipped because junit.xml was not generated."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        if ! grep -Eq '<(failure|error)[ >]' junit.xml; then
          {
            echo "## API Integration Test Failure Analysis"
            echo
            echo "Claude analysis skipped because junit.xml does not contain failure or error elements."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        PROMPT=$(cat <<'EOF'
        Analyze this Ginkgo JUnit XML from the identity API integration suite. Output markdown for a GitHub Actions step summary with:
        - a '## API Integration Test Failure Analysis' heading
        - a concise '### Failed Tests' table with columns Test, Error, Likely Cause
        - a short '### Suggested Next Steps' list
        Keep it specific to the failures shown and avoid generic advice.
        EOF
        )

        OUTPUT=$(npx --yes @anthropic-ai/claude-code -p \
          "$PROMPT" \
          < junit.xml 2>/dev/null || true)

        if [ -z "$OUTPUT" ]; then
          {
            echo "## API Integration Test Failure Analysis"
            echo
            echo "Claude did not return an analysis for junit.xml."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        printf '%s\n' "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        exit 0

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results
        path: |
          junit.xml
          test-results.json
