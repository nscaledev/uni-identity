name: Integration
on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review

permissions:
  contents: read

jobs:
  Integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for Teleport-backed OTLP collector shipping.
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install yq
      run: |
        wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod +x /usr/local/bin/yq

    - name: Install Helm
      uses: azure/setup-helm@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate random suffix
      id: rand
      run: echo "suffix=$(openssl rand -hex 4)" >> "$GITHUB_OUTPUT"

    - name: Create KinD cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: identity-${{ github.run_id }}
        config: hack/ci/kind-config.yaml

    - name: Install cluster infrastructure
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
      run: make integration-infra

    - name: Install identity
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
        KIND_SUFFIX: ${{ steps.rand.outputs.suffix }}
      run: make integration-install

    - name: Create test fixtures
      env:
        KIND_CLUSTER: identity-${{ github.run_id }}
        KIND_SUFFIX: ${{ steps.rand.outputs.suffix }}
      run: make integration-fixtures

    - name: Run API integration tests
      id: api-tests
      run: make test-api-ci

    - name: Report API Test Results
      uses: nscaledev/quality-tooling/.github/actions/test-results-report@main
      if: ${{ !cancelled() && (steps.api-tests.outcome == 'success' || steps.api-tests.outcome == 'failure') }}
      with:
        test-results-path: test-results.json
        format: ginkgo-json
        workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        environment: ci
        title: 'Identity API Integration Test Results'
        test-history-suite: uni-identity-api
        enable-ai-analysis: 'true'
        claude-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results
        path: |
          junit.xml
          test-results.json
