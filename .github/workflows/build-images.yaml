name: Build and Push Images
on:
  workflow_dispatch:
    inputs:
      image_org:
        description: 'Docker image organization (e.g. ghcr.io/nscaledev or ghcr.io/nscaledev/daily)'
        required: false
        default: 'ghcr.io/nscaledev/daily'
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and Push Images
      run: |
        VERSION="0.0.0-$(git rev-parse HEAD)"
        echo "Building version: ${VERSION}"
        echo "Pushing to: ${{ inputs.image_org }}"
        make touch all images -e RELEASE=1 VERSION="${VERSION}" DOCKER_ORG="${{ inputs.image_org }}"
