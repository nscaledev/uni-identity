name: Unikorn Merge
on:
  push:
    branches:
    - main
    tags-ignore:
    - '*'
permissions:
  contents: read
jobs:
  Coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Install Helm
      uses: azure/setup-helm@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Touch
      run: make touch
    - name: Unit Test
      run: make test-unit
    - name: Run Codecov
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  ProviderVerification:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Install Pact FFI Library
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          PACT_ARCH="x86_64"
        elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
          PACT_ARCH="aarch64"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi
        wget https://github.com/pact-foundation/pact-reference/releases/download/libpact_ffi-v0.4.22/libpact_ffi-linux-${PACT_ARCH}.so.gz
        gunzip libpact_ffi-linux-${PACT_ARCH}.so.gz
        sudo mkdir -p /usr/local/lib
        sudo mv libpact_ffi-linux-${PACT_ARCH}.so /usr/local/lib/libpact_ffi.so
        sudo ldconfig
    - name: Setup kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: contract-testing
    - name: Install CRDs
      run: |
        make charts/identity/crds
        kubectl apply -f charts/identity/crds/
    - name: Run Provider Contract Verification
      env:
        PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL_DEV }}
        PACT_BROKER_USERNAME: ${{ vars.PACT_BROKER_USERNAME }}
        PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        PROVIDER_VERSION: ${{ github.sha }}
        CGO_LDFLAGS: "-L/usr/local/lib"
        LD_LIBRARY_PATH: "/usr/local/lib"
      run: make test-contracts-provider-ci
  RecordDeployment:
    runs-on: ubuntu-latest
    needs: ProviderVerification
    steps:
    - name: Record Deployment
      run: |
        docker run --rm \
          --network host \
          pactfoundation/pact-cli:latest \
          pact-broker record-deployment \
          --pacticipant="uni-identity" \
          --version="${{ github.sha }}" \
          --environment="development" \
          --broker-base-url="${{ vars.PACT_BROKER_URL_DEV }}" \
          --broker-username="${{ vars.PACT_BROKER_USERNAME }}" \
          --broker-password="${{ secrets.PACT_BROKER_PASSWORD }}"
