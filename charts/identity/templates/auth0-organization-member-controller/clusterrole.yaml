apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-auth0-organization-member-controller
  labels:
    {{- include "unikorn.labels" . | nindent 4 }}
rules:
- apiGroups:
  - identity.unikorn-cloud.org
  resources:
  - auth0organizationmembers
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - identity.unikorn-cloud.org
  resources:
  - auth0organizationmembers/status
  verbs:
  - update
- apiGroups:
  - identity.unikorn-cloud.org
  resources:
  - auth0organizations
  - auth0users
  verbs:
  - get
  - list
  - watch
